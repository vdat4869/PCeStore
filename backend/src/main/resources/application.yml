server:
  port: ${SERVER_PORT:8080}

spring:
  messages:
    basename: i18n/messages
    encoding: UTF-8

  # Cấu hình kết nối cơ sở dữ liệu PostgreSQL từ file .env
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pcestore}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  # Cấu hình JPA / Hibernate
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update # Tự động tạo hoặc cập nhật cấu trúc database dựa theo Entity
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Cấu hình Spring Mail
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Cấu hình Cache cho Rate Limiting
  cache:
    type: caffeine
    cache-names:
      - login_buckets
      - emailTemplates
    caffeine:
      spec: expireAfterWrite=1h,maximumSize=10000

# Cấu hình JWT cho Token từ file .env
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration: ${JWT_EXPIRATION:900000}
      refresh-token:
        expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# Cấu hình tuỳ chỉnh khác
custom:
  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}
  mail:
    from: ${MAIL_FROM:noreply@pcestore.com}
  security:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      redirect-uri: ${GOOGLE_REDIRECT_URI:}
  storage:
    avatars: ${AVATAR_STORAGE_PATH:uploads/avatars}

# Cấu hình SePay payment gateway
sepay:
  merchant-id: ${SEPAY_MERCHANT_ID:sandbox_merchant}
  secret-key: ${SEPAY_SECRET_KEY:sandbox_secret}

# --- Cấu hình Rate Limiting ---
bucket4j:
  enabled: true
  filters:
    - cache-name: login_buckets
      url: /api/auth/login
      http-response-body: "{\"error\": \"Too Many Requests\", \"message\": \"Quá nhiều yêu cầu đăng nhập. Vui lòng thử lại sau 1 phút.\"}"
      rate-limits:
        - bandwidths:
            - capacity: 5
              time: 1
              unit: minutes


