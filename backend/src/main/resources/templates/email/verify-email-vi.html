<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Xác Nhận Tài Khoản</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f7f9fc;">
    <div style="font-family: 'Helvetica Neue', Arial, sans-serif; max-width: 600px; margin: 30px auto; padding: 30px; background-color: #ffffff; border: 1px solid #e1e8ed; border-top: 5px solid #2F80ED; border-radius: 12px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);">
        <h2 style="color: #2F80ED; text-align: center; margin-bottom: 25px; font-size: 24px; letter-spacing: -0.5px;">Xác Nhận Tài Khoản PCeStore</h2>
        <p style="color: #4a5568; font-size: 16px; line-height: 1.6;">Chào bạn,</p>
        <p style="color: #4a5568; font-size: 16px; line-height: 1.6;">Chào mừng bạn đã đến với PCeStore! Vui lòng nhấn vào nút bên dưới để kích hoạt tài khoản của bạn:</p>
        
        <div style="text-align: center; margin: 40px 0;">
            <a href="{{link}}" style="background-color: #1d4ed8; color: #ffffff; padding: 14px 35px; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 16px; display: inline-block; box-shadow: 0 4px 6px rgba(29, 78, 216, 0.25);">
                🔑 KÍCH HOẠT TÀI KHOẢN
            </a>
        </div>
        
        <div style="margin-top: 30px; padding-top: 20px; border-top: 1px dashed #e1e8ed;">
            <p style="color: #718096; font-size: 14px; margin: 5px 0;">(Mã xác nhận này sẽ hết hạn sau 24 giờ. Mã thủ công: <strong>{{token}}</strong>)</p>
        </div>
        
        <p style="color: #4a5568; font-size: 16px; margin-top: 30px;">Cảm ơn,<br><strong style="color: #2d3748;">PCeStore Team</strong></p>
    </div>
</body>
</html>
